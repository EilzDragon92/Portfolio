name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '0a434205c521ca43d66921271ae2a1d051e718a5'

      - name: Install dependencies
        run: vcpkg install openssl:x64-windows argon2:x64-windows gtest:x64-windows


      # ============================================================
      # FileEncryption
      # ============================================================

      - name: Build FileEncryption
        run: |
          cd Projects/FileEncryption
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release

      - name: Test FileEncryption
        run: |
          cd Projects/FileEncryption
          ctest --test-dir build -C Release --output-on-failure

      - name: Deploy FileEncryption
        run: |
          cd Projects/FileEncryption
          mkdir deploy

          copy build\Release\FileEncryption.exe deploy\

          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            deploy\FileEncryption.exe

          copy "$env:VCPKG_ROOT\installed\x64-windows\bin\libcrypto-3-x64.dll" deploy\
          copy "$env:VCPKG_ROOT\installed\x64-windows\bin\libssl-3-x64.dll" deploy\
          copy "$env:VCPKG_ROOT\installed\x64-windows\bin\argon2.dll" deploy\

          Compress-Archive -Path deploy\* -DestinationPath FileEncryption-Windows-x64.zip

          Get-ChildItem deploy -Recurse | Format-Table Name, Length


      # ============================================================
      # PasswordManager
      # ============================================================

      - name: Build PasswordManager
        run: |
          cd Projects/PasswordManager
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release

      - name: Test PasswordManager
        run: |
          cd Projects/PasswordManager
          ctest --test-dir build -C Release --output-on-failure

      - name: Deploy PasswordManager
        run: |
          cd Projects/PasswordManager
          mkdir deploy

          copy build\Release\PasswordManager.exe deploy\

          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            deploy\PasswordManager.exe

          copy "$env:VCPKG_ROOT\installed\x64-windows\bin\libcrypto-3-x64.dll" deploy\
          copy "$env:VCPKG_ROOT\installed\x64-windows\bin\libssl-3-x64.dll" deploy\
          copy "$env:VCPKG_ROOT\installed\x64-windows\bin\argon2.dll" deploy\

          Compress-Archive -Path deploy\* -DestinationPath PasswordManager-Windows-x64.zip

          Get-ChildItem deploy -Recurse | Format-Table Name, Length


      # ============================================================
      # Release
      # ============================================================

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Projects/FileEncryption/FileEncryption-Windows-x64.zip
            Projects/PasswordManager/PasswordManager-Windows-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}