name: Release PasswordManager

on:
  push:
    tags:
      - 'passwordmanager-v*'

jobs:

  # ============================================================
  # Windows
  # ============================================================

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '0a434205c521ca43d66921271ae2a1d051e718a5'

      - name: Install dependencies
        run: vcpkg install openssl:x64-windows argon2:x64-windows gtest:x64-windows

      - name: Build
        run: |
          cd Projects/PasswordManager
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release

      - name: Test
        run: |
          cd Projects/PasswordManager
          ctest --test-dir build -C Release --output-on-failure

      - name: Deploy
        run: |
          cd Projects/PasswordManager
          mkdir deploy

          copy build\Release\PasswordManager.exe deploy\

          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            deploy\PasswordManager.exe

          copy "$env:VCPKG_ROOT\installed\x64-windows\bin\libcrypto-3-x64.dll" deploy\
          copy "$env:VCPKG_ROOT\installed\x64-windows\bin\libssl-3-x64.dll" deploy\
          copy "$env:VCPKG_ROOT\installed\x64-windows\bin\argon2.dll" deploy\

          Compress-Archive -Path deploy\* -DestinationPath PasswordManager-Windows-x64.zip

          Get-ChildItem deploy -Recurse | Format-Table Name, Length

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PasswordManager-Windows-x64
          path: Projects/PasswordManager/PasswordManager-Windows-x64.zip


  # ============================================================
  # Linux
  # ============================================================

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libssl-dev libargon2-dev libgtest-dev

      - name: Build
        run: |
          cd Projects/PasswordManager
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Test
        run: |
          cd Projects/PasswordManager
          ctest --test-dir build --output-on-failure

      - name: Deploy
        run: |
          cd Projects/PasswordManager
          mkdir -p deploy

          cp build/PasswordManager deploy/

          tar -czf PasswordManager-Linux-x64.tar.gz -C deploy .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PasswordManager-Linux-x64
          path: Projects/PasswordManager/PasswordManager-Linux-x64.tar.gz


  # ============================================================
  # Release
  # ============================================================

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: PasswordManager-Windows-x64

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: PasswordManager-Linux-x64

      - name: List Artifacts
        run: find . -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PasswordManager-Windows-x64.zip
            PasswordManager-Linux-x64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}